name: z5-dev
channels:
  - conda-forge
dependencies:
  - python
  - cmake
  - compilers
  - bzip2
  - lz4-c
  - xz
  - libdeflate
  - nanobind
  - numpy
  - blosc
  - imageio
  - nlohmann_json
  - zarr >=3
  - h5py
  # C++ AWS SDK for the S3 backend (only used when building -DWITH_S3=ON)
  - aws-sdk-cpp
  # tensorstore has no conda-forge win-64 build, so install it from PyPI
  # (wheels exist for win/mac/linux on py>=3.11); interop tests skip if absent
  - pip
  - pip:
    - tensorstore
    # S3 backend test deps; the suite (test_s3.py) skips cleanly if absent.
    # moto[server] is required for the local ThreadedMotoServer the C++ AWS
    # SDK talks to (the in-process mock_aws cannot intercept it).
    - boto3
    - moto[server]
    - s3fs
